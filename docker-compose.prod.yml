services:
  api:
    image: phoenix-ai-api:1.0.0-beta
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env
    ports:
      - "4000:4000"
    volumes:
      - phoenix-storage:/app/.storage
      - phoenix-reports:/app/reports
      - phoenix-output:/app/output
    restart: unless-stopped

  studio:
    image: phoenix-ai-studio:1.0.0-beta
    build:
      context: .
      dockerfile: Dockerfile.studio
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

  worker:
    image: phoenix-ai-worker:1.0.0-beta
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - .env
    environment:
      PHOENIX_SCHEDULER_WORKER: "true"
    volumes:
      - phoenix-storage:/app/.storage
      - phoenix-reports:/app/reports
      - phoenix-output:/app/output
    restart: unless-stopped

volumes:
  phoenix-storage:
  phoenix-reports:
  phoenix-output:
