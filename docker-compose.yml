services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      NODE_ENV: production
      PHOENIX_ENV: production
      PHOENIX_API_KEY: ${PHOENIX_API_KEY:-change-me}
      PHOENIX_API_PORT: 4000
      PHOENIX_API_HOST: 0.0.0.0
      PHOENIX_STUDIO_ORIGIN: http://127.0.0.1:3000
      PHOENIX_PROVIDER: ${PHOENIX_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PHOENIX_IMAGE_PROVIDER: ${PHOENIX_IMAGE_PROVIDER:-mock}
      PHOENIX_IMAGE_MODEL: ${PHOENIX_IMAGE_MODEL:-gpt-image-1}
      PHOENIX_IMAGE_SIZE: ${PHOENIX_IMAGE_SIZE:-1024x1024}
      PHOENIX_VOICE_PROVIDER: ${PHOENIX_VOICE_PROVIDER:-mock}
      PHOENIX_VOICE_MODEL: ${PHOENIX_VOICE_MODEL:-gpt-4o-mini-tts}
      PHOENIX_VOICE_NAME: ${PHOENIX_VOICE_NAME:-alloy}
      PHOENIX_VOICE_FORMAT: ${PHOENIX_VOICE_FORMAT:-mp3}
      PHOENIX_VOICE_SPEED: ${PHOENIX_VOICE_SPEED:-1}
      PHOENIX_VIDEO_PROVIDER: ${PHOENIX_VIDEO_PROVIDER:-mock}
      PHOENIX_VIDEO_MODEL: ${PHOENIX_VIDEO_MODEL:-sora-2}
      PHOENIX_VIDEO_SIZE: ${PHOENIX_VIDEO_SIZE:-720x1280}
      PHOENIX_VIDEO_DURATION_SECONDS: ${PHOENIX_VIDEO_DURATION_SECONDS:-8}
      PHOENIX_VIDEO_POLL_INTERVAL_MS: ${PHOENIX_VIDEO_POLL_INTERVAL_MS:-5000}
      PHOENIX_VIDEO_TIMEOUT_MS: ${PHOENIX_VIDEO_TIMEOUT_MS:-600000}
    ports:
      - "4000:4000"
    volumes:
      - ./.storage:/app/.storage
      - ./reports:/app/reports
      - ./output:/app/output

  studio:
    build:
      context: .
      dockerfile: Dockerfile.studio
    environment:
      NEXT_PUBLIC_PHOENIX_API_URL: http://127.0.0.1:4000
      NEXT_PUBLIC_PHOENIX_API_KEY: ${PHOENIX_API_KEY:-change-me}
    ports:
      - "3000:3000"
    depends_on:
      - api

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      NODE_ENV: production
      PHOENIX_ENV: production
      PHOENIX_API_KEY: ${PHOENIX_API_KEY:-change-me}
      PHOENIX_API_PORT: 4001
      PHOENIX_API_HOST: 0.0.0.0
      PHOENIX_SCHEDULER_WORKER: "true"
      PHOENIX_SCHEDULER_INTERVAL_MS: ${PHOENIX_SCHEDULER_INTERVAL_MS:-60000}
      PHOENIX_PROVIDER: ${PHOENIX_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PHOENIX_IMAGE_PROVIDER: ${PHOENIX_IMAGE_PROVIDER:-mock}
      PHOENIX_IMAGE_MODEL: ${PHOENIX_IMAGE_MODEL:-gpt-image-1}
      PHOENIX_IMAGE_SIZE: ${PHOENIX_IMAGE_SIZE:-1024x1024}
      PHOENIX_VOICE_PROVIDER: ${PHOENIX_VOICE_PROVIDER:-mock}
      PHOENIX_VOICE_MODEL: ${PHOENIX_VOICE_MODEL:-gpt-4o-mini-tts}
      PHOENIX_VOICE_NAME: ${PHOENIX_VOICE_NAME:-alloy}
      PHOENIX_VOICE_FORMAT: ${PHOENIX_VOICE_FORMAT:-mp3}
      PHOENIX_VOICE_SPEED: ${PHOENIX_VOICE_SPEED:-1}
      PHOENIX_VIDEO_PROVIDER: ${PHOENIX_VIDEO_PROVIDER:-mock}
      PHOENIX_VIDEO_MODEL: ${PHOENIX_VIDEO_MODEL:-sora-2}
      PHOENIX_VIDEO_SIZE: ${PHOENIX_VIDEO_SIZE:-720x1280}
      PHOENIX_VIDEO_DURATION_SECONDS: ${PHOENIX_VIDEO_DURATION_SECONDS:-8}
      PHOENIX_VIDEO_POLL_INTERVAL_MS: ${PHOENIX_VIDEO_POLL_INTERVAL_MS:-5000}
      PHOENIX_VIDEO_TIMEOUT_MS: ${PHOENIX_VIDEO_TIMEOUT_MS:-600000}
    volumes:
      - ./.storage:/app/.storage
      - ./reports:/app/reports
      - ./output:/app/output
