name: reel
version: 1.0
description: Pipeline for short-form reel generation.

input_schema: ../schemas/task.schema.json
response_schema: ../schemas/response.schema.json

steps:
  - id: brand_loader
    type: system
    description: Load Brand DNA from brand registry.

  - id: research
    type: agent
    agent: research
    description: Extract emotional, behavioral, and language insights.

  - id: hook_specialist
    type: agent
    agent: hook_specialist
    description: Generate the first 3 seconds.

  - id: story_writer
    type: agent
    agent: story_writer
    description: Generate story development.

  - id: reviewer
    type: agent
    agent: reviewer
    description: Score and approve or reject the result.
    gate:
      pass_if: score >= 90
      on_fail: revision_required

output:
  fields:
    - hook
    - story
    - ending
    - caption
    - hashtags
    - video_prompt
    - thumbnail_prompt
    - cta

